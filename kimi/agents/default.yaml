version: 1
agent:
  extend: default
  subagents:
    builder:
      path: ./builder.yaml
      description: Implements features or fixes according to a predefined plan, creating implementation reports with timestamps and bidirectional links to plans
    reviewer:
      path: ./reviewer.yaml
      description: Reviews build agent's implementation against predefined plans, creating review reports with timestamps and bidirectional links
    general:
      path: ./general.yaml
      description: General-purpose agent for researching complex questions and executing multi-step tasks. Use this agent to execute multiple units of work in parallel.
