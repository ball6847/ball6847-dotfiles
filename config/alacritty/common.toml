[window]
# padding = { x = 10, y = 10 }
startup_mode = "Maximized"
dynamic_padding = true
padding = { x = 0, y = 0 }

[selection]
# Ensure this is NOT set to true if you want tmux to handle it
save_to_clipboard = true

[keyboard]
bindings = [
  { key = "Backspace", mods = "Control", chars = "\u0017" },
  { key = "J", mods = "Command|Shift", chars = "\u001b[74;4u" },
  { key = "K", mods = "Command|Shift", chars = "\u001b[75;4u" },
  { key = "L", mods = "Command", chars = "\u001b[108;3u" },
  # Windows/WSL: Use \u000a (LF) for Shift+Enter if \u001b[10;2u doesn't work
  # Backup original sequence: { key = "Enter", mods = "Shift", chars = "\u001b[10;2u" },
  { key = "Enter", mods = "Shift", chars = "\u000a" },
  # New Tab — macOS: Cmd+T, Windows/Linux: Ctrl+Shift+T
  { key = "T", mods = "Command", action = "CreateNewTab" },
  { key = "T", mods = "Control|Shift", action = "CreateNewTab" },
  # New Window — macOS: Cmd+N, Windows/Linux: Ctrl+Shift+N
  { key = "N", mods = "Command", action = "SpawnNewInstance" },
  { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
  # Tab Navigation
  # Previous tab — macOS: Cmd+Shift+[, Windows/Linux: Ctrl+Shift+[
  { key = "[", mods = "Command|Shift", action = "SelectPreviousTab" },
  { key = "[", mods = "Control|Shift", action = "SelectPreviousTab" },
  # Next tab — macOS: Cmd+Shift+], Windows/Linux: Ctrl+Shift+]
  { key = "]", mods = "Command|Shift", action = "SelectNextTab" },
  { key = "]", mods = "Control|Shift", action = "SelectNextTab" },
  # Windows/WSL: Explicitly send ESC + m so tmux receives Alt+M even if another
  # app (e.g. Discord) has registered it as a global hotkey.
  { key = "M", mods = "Alt", chars = "\u001bm" },
  # Navigate by word (Option/Alt + Arrow keys). Primarily for macOS with
  # window.option_as_alt set, but harmless on other platforms.
  { key = "Left", mods = "Alt", chars = "\u001bb" },   # ESC + b (backward word)
  { key = "Right", mods = "Alt", chars = "\u001bf" },  # ESC + f (forward word)
]

[font]
size = 10.5
offset = { x = 1, y = 5 }

[font.normal]
family = "M+1Code Nerd Font"

[font.bold]
family = "M+1Code Nerd Font"
style = "Bold"

[font.italic]
family = "M+1Code Nerd Font"
style = "Italic"

[font.bold_italic]
family = "M+1Code Nerd Font"
style = "Bold Italic"
#
[terminal]
# ensure true color is enabled
shell = "/bin/zsh"
osc52 = "CopyPaste"

[env]
# Set environment variables for true color support
COLORTERM = "truecolor"
TERM = "xterm-256color"

[debug]
# Enable debug rendering if needed for color testing
# render_timer = true
